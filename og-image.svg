<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#1e3a8a"/>
      <stop offset="55%"  stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="overlay" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.35"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#overlay)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="5" fill="#ffffff" opacity="0.25"/>

  <!-- Left accent bar -->
  <rect x="80" y="80" width="5" height="300" fill="#ffffff" opacity="0.35"/>

  <!-- "N" monogram badge -->
  <circle cx="152" cy="130" r="52" fill="#ffffff" opacity="0.12"/>
  <circle cx="152" cy="130" r="44" fill="#ffffff" opacity="0.10"/>
  <text x="152" y="148" font-family="'Courier New', Courier, monospace" font-size="52" font-weight="700" text-anchor="middle" fill="#ffffff" opacity="0.9">N</text>

  <!-- Author label -->
  <text x="108" y="260" font-family="'Helvetica Neue', Arial, sans-serif" font-size="24" font-weight="300" letter-spacing="4" fill="#93c5fd">DEV. HARSHIT</text>

  <!-- Main title -->
  <text x="108" y="340" font-family="'Helvetica Neue', Arial, sans-serif" font-size="72" font-weight="700" fill="#ffffff">Node.js Roadmap</text>

  <!-- Subtitle -->
  <text x="110" y="405" font-family="'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#bfdbfe">30-Day Backend Mastery Plan</text>

  <!-- Tag pills -->
  <rect x="110" y="445" width="130" height="36" rx="18" fill="#ffffff" opacity="0.15"/>
  <text x="175" y="469" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="500" text-anchor="middle" fill="#ffffff">REST APIs</text>

  <rect x="254" y="445" width="130" height="36" rx="18" fill="#ffffff" opacity="0.15"/>
  <text x="319" y="469" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="500" text-anchor="middle" fill="#ffffff">Databases</text>

  <rect x="398" y="445" width="90" height="36" rx="18" fill="#ffffff" opacity="0.15"/>
  <text x="443" y="469" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="500" text-anchor="middle" fill="#ffffff">Auth</text>

  <rect x="502" y="445" width="180" height="36" rx="18" fill="#ffffff" opacity="0.15"/>
  <text x="592" y="469" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="500" text-anchor="middle" fill="#ffffff">Architecture</text>

  <!-- Bottom strip -->
  <rect x="0" y="570" width="1200" height="60" fill="#000000" opacity="0.3"/>
  <text x="108" y="607" font-family="'Courier New', Courier, monospace" font-size="18" fill="#93c5fd" opacity="0.85">harrisonharshit.github.io/node-js-learning</text>

  <!-- Decorative right side dots -->
  <circle cx="980" cy="200" r="120" fill="#ffffff" opacity="0.04"/>
  <circle cx="1080" cy="350" r="180" fill="#ffffff" opacity="0.04"/>
  <circle cx="920" cy="440" r="80"  fill="#ffffff" opacity="0.05"/>
</svg>
